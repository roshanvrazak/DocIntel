services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-docintel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-docintel}
      - POSTGRES_DB=${POSTGRES_DB:-docintel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel -d docintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_LOG=DEBUG
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health/readiness\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - ollama
    restart: always

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
      - "4318:4318"
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://docintel:docintel@postgres:5432/docintel}
      - REDIS_URL=redis://redis:6379/0
      - LITELLM_PROXY_URL=http://litellm:4000
      - OLLAMA_URL=http://ollama:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/backend
      - ./backend/uploads:/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    command: >
      sh -c "python backend/app/db/init_db.py && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build: ./backend
    command: celery -A backend.app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://docintel:docintel@postgres:5432/docintel}
      - REDIS_URL=redis://redis:6379/0
      - LITELLM_PROXY_URL=http://litellm:4000
      - OLLAMA_URL=http://ollama:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/backend
      - ./backend/uploads:/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_models:
